name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            features: "--features gui"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: "--features gui"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          dir="target/${{ matrix.target }}/release"
          # Always ship the TUI; include the GUI binary too when it was built.
          bins=(tessera)
          [ -f "$dir/tessera-gui" ] && bins+=(tessera-gui)
          tar -C "$dir" -czf "dist/tessera-${{ steps.tag.outputs.tag }}-${{ matrix.target }}.tar.gz" "${bins[@]}"
          (cd dist && shasum -a 256 *.tar.gz > "tessera-${{ steps.tag.outputs.tag }}-${{ matrix.target }}.sha256")

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dir = "target/${{ matrix.target }}/release"
          $files = @("$dir/tessera.exe")
          if (Test-Path "$dir/tessera-gui.exe") { $files += "$dir/tessera-gui.exe" }
          Compress-Archive -Path $files -DestinationPath "dist/tessera-${{ steps.tag.outputs.tag }}-${{ matrix.target }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tessera-${{ matrix.target }}
          path: dist/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Tessera ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: artifacts/**/*
